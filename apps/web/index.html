<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCoding — Aprenda a construir com IA</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Hero Section -->
    <main class="hero">
        <div class="hero-content">
            <h1>Vibe<span class="accent">Coding</span></h1>
            <p class="tagline">Construa software com IA, sem precisar saber programar.</p>
            <p class="subtitle">Converse com nossa IA e descubra o melhor caminho para voce.</p>
        </div>
    </main>

    <!-- Chat Widget -->
    <div id="chat-toggle" class="chat-toggle" title="Fale com a Bia">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
    </div>

    <div id="chat-window" class="chat-window hidden">
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="avatar">B</div>
                <div>
                    <div class="chat-header-name">Bia — VibeCoding</div>
                    <div class="chat-header-status">Online agora</div>
                </div>
            </div>
            <button id="chat-close" class="chat-close" title="Fechar">&times;</button>
        </div>

        <div id="chat-messages" class="chat-messages">
            <!-- Mensagens aparecem aqui -->
        </div>

        <div class="chat-input-area">
            <input
                id="chat-input"
                type="text"
                placeholder="Digite sua mensagem..."
                autocomplete="off"
                maxlength="1000"
            >
            <button id="chat-send" class="chat-send" title="Enviar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="/static/chat.js"></script>
</body>
</html>
